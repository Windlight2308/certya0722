<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄色耳机仓 - 专属歌单</title>
    <!-- 引入 Google 官方思源宋体（Noto Serif SC）的 300细体 字库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300&display=swap" rel="stylesheet">
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 沉浸式全屏，禁止滚动 */
            font-family: "Noto Serif SC", "Source Han Serif SC", "思源宋体", serif;
        }

        /* 背景设置 */
        .bg-container {
            width: 100vw;
            height: 100vh;
            background-image: url('assets/images/粉色底图7（波点、花、朦胧）.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center; /* 纵向居中，保证所有元素都在横向中轴线对称 */
            justify-content: center;
        }

        /* 核心内容区包裹 */
        .content-wrapper {
            width: 90%;
            max-width: 1200px;
            height: 70%;
            display: flex;
            align-items: center;
            /* 改为居中对齐并设置间距，把右侧卡片往左拉近 */
            justify-content: center; 
            gap: 6%; 
        }

        /* ---------------- 左侧：耳机仓与返回键 ---------------- */
        .left-section {
            flex: 0 0 42%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 耳机仓图标 */
        .pod-image {
            width: 65%;
            max-width: 320px;
            object-fit: contain;
            z-index: 2;
        }
        /* 返回键 - 位于左下角 */
        .back-btn {
            position: absolute;
            bottom: 5%;
            left: 5%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.3s;
        }
        .back-btn:hover {
            opacity: 0.7;
        }

        /* ---------------- 右侧：两个卡片排版 ---------------- */
        .right-section {
            flex: 0 0 45%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            gap: 12%; /* 两个方块之间的纵向间距 */
        }

        /* 卡片主体 */
        .music-card {
            background-color: #faf5f6; /* 卡其色底色 */
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); 
            padding: 20px;
            display: flex;
            align-items: stretch; 
            width: 100%;
            max-width: 500px;
        }

        /* 封面区 (左侧 1/3) */
        .card-cover {
            width: 33.33%;
            flex-shrink: 0;
            display: flex;
            align-items: center; /* 【已修改】让封面在卡片内部上下完全居中 */
        }
        .card-cover img {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1; 
            object-fit: cover;
            border-radius: 6px; 
            display: block;
        }

        /* 信息区 (右侧) */
        .card-info {
            width: 66.67%;
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            color: #000000; 
        }
        
        /* 歌名 */
        .song-title {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.1;
            margin-top: 0; 
        }
        
        /* 一句话介绍 - 【已修改】字体放大到18px */
        .song-desc {
            font-size: 18px; 
            margin-top: 12px;
            line-height: 1.6;
            width: 11em; /* 保证在11个字符左右换行 */
            word-wrap: break-word;
        }

        /* 播放键区 */
        .play-btn-wrapper {
            margin-top: auto; 
            padding-top: 20px;
        }
        .play-btn {
            width: 32px;
            cursor: pointer;
            display: block;
            transition: transform 0.2s;
        }
        .play-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <audio id="audio-1" src="assets/audio/蜘蛛丝.mp3" preload="auto"></audio>
    <audio id="audio-2" src="assets/audio/Sleeping pretend.mp3" preload="auto"></audio>

    <div class="bg-container">
        <div class="content-wrapper">
            
            <div class="left-section">
                <a href="music.html" class="back-btn">
                    <img src="assets/images/抠图版返回键.png" alt="返回" style="width:100%; height:100%;">
                </a>
                
                <img class="pod-image" src="assets/images/黄色耳机仓.png" alt="黄色耳机仓">
            </div>

            <div class="right-section">
                
                <div class="music-card">
                    <div class="card-cover">
                        <img src="assets/images/蜘蛛丝封面.jpg" alt="蜘蛛丝">
                    </div>
                    <div class="card-info">
                        <div class="song-title">蜘蛛糸モノポリー</div>
                        <div class="song-desc">你还记不记得你说这首歌很配芥川的《罗生门》？</div>
                        <div class="play-btn-wrapper">
                            <img class="play-btn" id="btn-1" src="assets/images/播放键.png" alt="播放">
                        </div>
                    </div>
                </div>

                <div class="music-card">
                    <div class="card-cover">
                        <img src="assets/images/Sleeping present封面.jpg" alt="Sleeping present">
                    </div>
                    <div class="card-info">
                        <div class="song-title">Sleeping present</div>
                        <div class="song-desc">你还记不记得你当时为什么向我分享这首歌？</div>
                        <div class="play-btn-wrapper">
                            <img class="play-btn" id="btn-2" src="assets/images/播放键.png" alt="播放">
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const audio1 = document.getElementById('audio-1');
        const audio2 = document.getElementById('audio-2');
        const btn1 = document.getElementById('btn-1');
        const btn2 = document.getElementById('btn-2');

        let currentActiveAudio = null;

        function toggleAudio(targetAudio) {
            if (currentActiveAudio === targetAudio) {
                targetAudio.pause();
                targetAudio.currentTime = 0; 
                currentActiveAudio = null;
            } 
            else {
                if (currentActiveAudio) {
                    currentActiveAudio.pause();
                    currentActiveAudio.currentTime = 0;
                }
                targetAudio.currentTime = 0; 
                targetAudio.play();
                currentActiveAudio = targetAudio;
            }
        }

        btn1.addEventListener('click', () => toggleAudio(audio1));
        btn2.addEventListener('click', () => toggleAudio(audio2));
    </script>
</body>
</html>
