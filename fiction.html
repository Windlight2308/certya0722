<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiction - Certya's Secret Garden</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="fiction-container">
        
        <div class="purple-overlay">
            
            <div class="tarot-carousel">
                <div class="tarot-card" data-index="0" data-link="work-magician.html">
                    <img src="assets/images/魔术师.png" alt="魔术师">
                </div>
                <div class="tarot-card" data-index="1" data-link="work-empress.html">
                    <img src="assets/images/女皇.png" alt="女皇">
                </div>
                <div class="tarot-card" data-index="2" data-link="work-wheel.html">
                    <img src="assets/images/命运之轮.png" alt="命运之轮">
                </div>
                <div class="tarot-card" data-index="3" data-link="work-world.html">
                    <img src="assets/images/世界.png" alt="世界">
                </div>
                <div class="tarot-card" data-index="4" data-link="work-nineofcups.html">
                    <img src="assets/images/圣杯九.png" alt="圣杯九">
                </div>
                <div class="tarot-card" data-index="5" data-link="work-sun.html">
                    <img src="assets/images/太阳.png" alt="太阳">
                </div>
                <div class="tarot-card" data-index="6" data-link="work-judgement.html">
                    <img src="assets/images/审判.png" alt="审判">
                </div>
                <div class="tarot-card" data-index="7" data-link="work-star.html">
                    <img src="assets/images/星星.png" alt="星星">
                </div>
            </div>

            <div class="tarot-instruction">-请左右滑动并点击牌面-</div>

            <a href="enter.html" class="purple-back-link">
                <img src="assets/images/抠图版返回键.png" alt="返回主页面" class="purple-back-icon">
            </a>

        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
